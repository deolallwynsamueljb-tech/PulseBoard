<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fixing AgriIntel...</title>
  <style>
    body { background: #09090b; color: #a1a1aa; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; text-align: center; }
    h2 { color: #10b981; }
    p  { margin: 8px 0; }
  </style>
</head>
<body>
  <div>
    <h2>Fixing browser cache...</h2>
    <p id="msg">Unregistering service worker...</p>
    <p id="done" style="display:none; color:#10b981; font-size:1.2em">
      ✓ Done! Redirecting to the app...
    </p>
  </div>
  <script>
    async function fix() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      // Also clear all caches
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      document.getElementById('msg').style.display = 'none';
      document.getElementById('done').style.display = 'block';
      setTimeout(() => { window.location.replace('/'); }, 1500);
    }
    fix();
  </script>
</body>
</html>
